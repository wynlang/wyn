name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, macos-15-intel, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          for ($i = 0; $i -lt 3; $i++) {
            choco install make mingw -y --no-progress 2>$null
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Retry $($i+1)/3..."
            Start-Sleep -Seconds 10
          }
          gcc --version
        shell: pwsh

      - name: Build compiler
        run: |
          # Remove macOS-only binaries that don't work on other platforms
          rm -f vendor/tcc/bin/tcc runtime/libwyn_rt.a runtime/libwyn_rt_tcc.a 2>/dev/null || true
          make clean && make
        shell: bash

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          echo 'fn main() -> int { println("Hello from Wyn CI"); return 0 }' > /tmp/smoke.wyn
          ./wyn build /tmp/smoke.wyn
          /tmp/smoke | grep -q "Hello from Wyn CI"
          echo "✅ Compiler builds and runs programs"

          echo 'test "math" { assert_eq(2 + 2, 4) }' > /tmp/smoke_test.wyn
          ./wyn build /tmp/smoke_test.wyn
          /tmp/smoke_test
          echo "✅ Test framework works"

          echo 'struct Point { x: int, y: int }
          fn main() -> int {
            var p = Point { x: 3, y: 4 }
            var s = "hello"
            println("${s} ${p.x},${p.y}")
            return 0
          }' > /tmp/smoke_adv.wyn
          ./wyn build /tmp/smoke_adv.wyn
          /tmp/smoke_adv | grep -q "hello 3,4"
          echo "✅ Structs, interpolation, var inference work"
        shell: bash

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          echo fn main() -^> int { println("Hello from Wyn CI"); return 0 } > smoke.wyn
          .\wyn.exe build smoke.wyn
          if exist smoke.exe ( .\smoke.exe ) else if exist smoke ( .\smoke ) else ( echo ERROR: binary not found && exit /b 1 )
        shell: cmd

      - name: Run test suite (Unix)
        if: runner.os != 'Windows'
        run: bash tests/run_tests_parallel.sh
        shell: bash

      - name: Run expect + regression tests (Unix)
        if: runner.os != 'Windows'
        run: bash tests/run_bdd.sh
        shell: bash

      - name: Run suite on the coroutine async substrate (W8, Unix)
        # WYN_ASYNC_CORO=1 runs awaited spawn/await_all/parallel as coroutines on
        # the M:N scheduler instead of the thread pool. The suite must be
        # behavior-identical on both substrates.
        if: runner.os != 'Windows'
        run: WYN_ASYNC_CORO=1 bash tests/run_bdd.sh
        shell: bash

      - name: Run test suite (Windows)
        if: runner.os == 'Windows'
        run: |
          printf 'fn main() -> int { var s = "hello"; println(s.upper()); println(s.len().to_string()); var arr: [int] = [3,1,2]; arr.sort(); println(arr[0].to_string()); return 0 }\n' > wintest.wyn
          ./wyn.exe build wintest.wyn
          ./wintest.exe
        shell: bash

      # Bindgen shells out to `cc -E`; the Unix jobs cover it via `make test`, but
      # the Windows job doesn't run that suite, so exercise `wyn bind` explicitly
      # here to prove the C-header binding generator works on Windows too.
      - name: Bindgen smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          printf 'int add_one(int x);\ndouble half(double x);\nvoid* obj_new(int n);\n' > winhdr.h
          ./wyn.exe bind winhdr.h > winbind.wyn 2>bind_err.txt || (echo "wyn bind failed"; cat bind_err.txt; exit 1)
          cat winbind.wyn
          grep -q "extern fn add_one(a0: int) -> int;" winbind.wyn || (echo "MISSING add_one"; exit 1)
          grep -q "extern fn half(a0: float) -> float;" winbind.wyn || (echo "MISSING half"; exit 1)
          grep -q "extern fn obj_new(a0: int) -> ptr;" winbind.wyn || (echo "MISSING obj_new"; exit 1)
          echo "Windows bindgen smoke: PASS"
        shell: bash

      # Prove the whole FFI pipeline on Windows against a header/lib we fully
      # control (mingw's system math.h declares fns via CRT-inline/macro machinery
      # a naive scanner can't see - that's a bindgen-coverage matter, orthogonal to
      # the pipeline). This exercises bindgen -> extern fn -> [ffi] link -> build ->
      # run with a hand-written lib.
      - name: FFI pipeline smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          printf 'int triple(int x);\ndouble scale(double x, double f);\n' > mylib.h
          printf 'int triple(int x){return x*3;}\ndouble scale(double x,double f){return x*f;}\n' > mylib.c
          gcc -c mylib.c -o mylib.o && ar rcs libmylib.a mylib.o
          ./wyn.exe bind mylib.h > mybind.wyn 2>err.txt || (echo "bind failed"; cat err.txt; exit 1)
          cat mybind.wyn
          grep -q "extern fn triple(a0: int) -> int;" mybind.wyn || (echo "MISSING triple"; exit 1)
          grep -q "extern fn scale(a0: float, a1: float) -> float;" mybind.wyn || (echo "MISSING scale"; exit 1)
          printf '[project]\nname="t"\n[ffi]\nlibs="mylib"\nlib_dirs="."\n' > wyn.toml
          printf 'extern fn triple(a0: int) -> int;\nfn main() { println("${triple(9)}") }\n' > app.wyn
          ./wyn.exe build app.wyn
          if [ -f app.exe ]; then ./app.exe > got.txt; else ./app > got.txt; fi
          cat got.txt
          grep -q "27" got.txt || (echo "wrong result"; exit 1)
          echo "Windows FFI pipeline smoke: PASS"
        shell: bash

      # The LSP server shells out to `wyn check` and writes temp files - exactly
      # the path/shell-out surface that has broken on Windows before. The Windows
      # job doesn't run `make test`, so drive the LSP protocol test explicitly.
      - name: LSP smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          WYN=./wyn.exe python3 tests/lsp/lsp_client.py
        shell: bash

  # The RC/string/IO bugs live in the RUNTIME; every real UAF so far was
  # found by ASan-compiling the runtime and running programs against it -
  # but only when a human remembered to. This job makes it a gate.
  sanitize-runtime:
    name: ASan runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Build compiler
        run: make clean && make
      - name: ASan runtime test set
        run: make asan-runtime-test

  # Data races hide in whichever executor a test doesn't exercise - the
  # coroutine scheduler (default) or the legacy thread pool (WYN_ASYNC_POOL=1).
  # The tsan-runtime-test target runs every concurrency test under BOTH.
  sanitize-runtime-tsan:
    name: TSan runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Build compiler
        run: make clean && make
      - name: TSan runtime test set (both executors)
        run: make tsan-runtime-test

  cross-compile-ios:
    name: Cross-compile (iOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make clean && make
      - name: Cross-compile for iOS
        run: |
          echo 'fn main() -> int { return 0 }' > /tmp/ios.wyn
          ./wyn cross ios /tmp/ios.wyn
          file /tmp/ios.wyn.ios | grep -q "arm64"
          echo "✅ iOS cross-compilation works"
      - name: Cross-compile mobile-shim smoke app (counter-app shape)
        run: |
          cp tests/mobile/smoke_mobile_shim.wyn /tmp/shim.wyn
          ./wyn cross ios /tmp/shim.wyn
          file /tmp/shim.wyn.ios | grep -q "arm64"
          echo "✅ iOS mobile-shim app cross-compiles"

  cross-compile-android:
    name: Cross-compile (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Build
        run: make clean && make
      - name: Cross-compile for Android
        run: |
          echo 'fn main() -> int { return 0 }' > /tmp/android.wyn
          ./wyn cross android /tmp/android.wyn && echo "✅ Android cross-compilation works" || echo "⚠️ Android NDK not available - skipped"
      - name: Cross-compile mobile-shim smoke app (counter-app shape)
        run: |
          cp tests/mobile/smoke_mobile_shim.wyn /tmp/shim.wyn
          ./wyn cross android /tmp/shim.wyn && echo "✅ Android mobile-shim app cross-compiles" || echo "⚠️ Android NDK not available - skipped"

  build-runtime-libs:
    name: Build runtime (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            cc: gcc
            arch_flags: ""
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            cc: gcc
            arch_flags: ""
          - target: macos-arm64
            runner: macos-15
            cc: clang
            arch_flags: ""
          - target: macos-x64
            runner: macos-15-intel
            cc: clang
            arch_flags: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Build runtime library
        run: |
          make runtime
          cp runtime/libwyn_rt.a runtime/libwyn_rt_${{ matrix.target }}.a
          echo "✅ Built libwyn_rt_${{ matrix.target }}.a"
          nm runtime/libwyn_rt_${{ matrix.target }}.a | grep " T " | wc -l | xargs echo "Symbols:"

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwyn_rt_${{ matrix.target }}
          path: runtime/libwyn_rt_${{ matrix.target }}.a
