# Curated C-package registry for `wyn add <name>`.
# Each [<name>] recipe describes how to obtain + link a C library and which
# headers to generate bindings from. The portable default is a system library
# (via -l) resolved by name; bundled-source recipes vendor the .c and build a .a
# at add-time (works identically on every platform). Fields:
#   description   - one-line summary (shown by `wyn add`)
#   version       - recipe/library version string (pinned into wyn.lock)
#   libs          - library names → -l<name> (written into the user's [ffi].libs)
#   lib_dirs      - extra -L search dirs (optional)
#   include_dirs  - extra -I search dirs (optional; also used to find headers to bind)
#   headers       - comma/space list of header names to run `wyn bind` over
#   system.<mgr>  - per-OS system package name (informational: install hint)

[m]
description = "C math library (libm) - sqrt, pow, sin, cos, …"
version = "system"
libs = "m"
headers = "math.h"

[z]
description = "zlib - DEFLATE compression (compress2, uncompress, crc32)"
version = "system"
libs = "z"
headers = "zlib.h"
system.brew = "zlib"
system.apt = "zlib1g-dev"
system.pacman = "zlib"

[curl]
description = "libcurl - HTTP/URL transfers"
version = "system"
libs = "curl"
headers = "curl/curl.h"
system.brew = "curl"
system.apt = "libcurl4-openssl-dev"
system.pacman = "curl"

[sqlite3]
description = "SQLite - embedded SQL database engine (opaque handles + prepared statements)"
version = "system"
libs = "sqlite3"
headers = "sqlite3.h"
system.brew = "sqlite"
system.apt = "libsqlite3-dev"
system.pacman = "sqlite"

[crypto]
description = "OpenSSL libcrypto - hashing (SHA/MD5), ciphers, RSA/EC, random"
version = "system"
libs = "crypto"
pkgconfig = "libcrypto"
headers = "openssl/sha.h, openssl/evp.h, openssl/rand.h"
system.brew = "openssl"
system.apt = "libssl-dev"
system.pacman = "openssl"

[ssl]
description = "OpenSSL libssl - TLS/SSL client and server sockets"
version = "system"
libs = "ssl, crypto"
pkgconfig = "libssl"
headers = "openssl/ssl.h"
system.brew = "openssl"
system.apt = "libssl-dev"
system.pacman = "openssl"

[curses]
description = "ncurses - terminal UI (windows, input, colors)"
version = "system"
libs = "ncurses"
headers = "curses.h"
system.brew = "ncurses"
system.apt = "libncurses-dev"
system.pacman = "ncurses"

[readline]
description = "GNU Readline - line editing + history for interactive prompts"
version = "system"
libs = "readline"
headers = "readline/readline.h, readline/history.h"
system.brew = "readline"
system.apt = "libreadline-dev"
system.pacman = "readline"

[xml2]
description = "libxml2 - XML/HTML parsing (DOM, XPath, SAX)"
version = "system"
libs = "xml2"
pkgconfig = "libxml-2.0"
include_dirs = "/usr/include/libxml2, /opt/homebrew/include/libxml2, /usr/local/include/libxml2"
headers = "libxml/parser.h, libxml/tree.h"
system.brew = "libxml2"
system.apt = "libxml2-dev"
system.pacman = "libxml2"

[lz4]
description = "LZ4 - extremely fast compression/decompression"
version = "system"
libs = "lz4"
pkgconfig = "liblz4"
headers = "lz4.h"
system.brew = "lz4"
system.apt = "liblz4-dev"
system.pacman = "lz4"

[zstd]
description = "Zstandard - fast, high-ratio compression (Facebook)"
version = "system"
libs = "zstd"
pkgconfig = "libzstd"
headers = "zstd.h"
system.brew = "zstd"
system.apt = "libzstd-dev"
system.pacman = "zstd"

[jsonc]
description = "json-c - JSON parsing and generation in C"
version = "system"
libs = "json-c"
pkgconfig = "json-c"
include_dirs = "/usr/include/json-c, /opt/homebrew/include/json-c, /usr/local/include/json-c"
# json.h is an umbrella that only #includes the real headers; bindgen scans decls
# from the TARGET header only, so bind the functional sub-headers directly.
headers = "json-c/json_object.h, json-c/json_tokener.h, json-c/linkhash.h"
system.brew = "json-c"
system.apt = "libjson-c-dev"
system.pacman = "json-c"

[png]
description = "libpng - PNG image reading and writing"
version = "system"
libs = "png"
pkgconfig = "libpng"
headers = "png.h"
system.brew = "libpng"
system.apt = "libpng-dev"
system.pacman = "libpng"

[jpeg]
description = "libjpeg - JPEG image compression and decompression"
version = "system"
libs = "jpeg"
pkgconfig = "libjpeg"
headers = "jpeglib.h"
system.brew = "jpeg"
system.apt = "libjpeg-dev"
system.pacman = "libjpeg-turbo"

[pcre2]
description = "PCRE2 - Perl-Compatible Regular Expressions (8-bit)"
version = "system"
libs = "pcre2-8"
pkgconfig = "libpcre2-8"
headers = "pcre2.h"
# pcre2.h errors out unless the code-unit width is defined before inclusion.
defines = "PCRE2_CODE_UNIT_WIDTH=8"
system.brew = "pcre2"
system.apt = "libpcre2-dev"
system.pacman = "pcre2"

[yaml]
description = "libyaml - YAML 1.1 parser and emitter"
version = "system"
libs = "yaml"
pkgconfig = "yaml-0.1"
headers = "yaml.h"
system.brew = "libyaml"
system.apt = "libyaml-dev"
system.pacman = "libyaml"

[ffi]
description = "libffi - portable foreign function interface (calling conventions)"
version = "system"
libs = "ffi"
pkgconfig = "libffi"
headers = "ffi.h"
system.brew = "libffi"
system.apt = "libffi-dev"
system.pacman = "libffi"

[uuid]
description = "libuuid - UUID generation (RFC 4122)"
version = "system"
libs = "uuid"
pkgconfig = "uuid"
headers = "uuid/uuid.h"
system.brew = "ossp-uuid"
system.apt = "uuid-dev"
system.pacman = "util-linux-libs"

[ev]
description = "libev - high-performance event loop (epoll/kqueue/select)"
version = "system"
libs = "ev"
headers = "ev.h"
system.brew = "libev"
system.apt = "libev-dev"
system.pacman = "libev"

[uv]
description = "libuv - cross-platform async I/O (event loop, TCP, UDP, FS)"
version = "system"
libs = "uv"
pkgconfig = "libuv"
headers = "uv.h"
system.brew = "libuv"
system.apt = "libuv1-dev"
system.pacman = "libuv"

[sdl2]
description = "SDL2 - cross-platform graphics, audio, and input"
version = "system"
libs = "SDL2"
pkgconfig = "sdl2"
include_dirs = "/opt/homebrew/include/SDL2, /usr/include/SDL2, /usr/local/include/SDL2"
headers = "SDL.h"
system.brew = "sdl2"
system.apt = "libsdl2-dev"
system.pacman = "sdl2"

[pthread]
description = "POSIX threads - mutexes, conditions, thread creation"
version = "system"
libs = "pthread"
headers = "pthread.h"

[expat]
description = "Expat - streaming XML parser (SAX-style)"
version = "system"
libs = "expat"
pkgconfig = "expat"
headers = "expat.h"
system.brew = "expat"
system.apt = "libexpat1-dev"
system.pacman = "expat"

[bz2]
description = "bzip2 - block-sorting compression"
version = "system"
libs = "bz2"
headers = "bzlib.h"
system.brew = "bzip2"
system.apt = "libbz2-dev"
system.pacman = "bzip2"

[iconv]
description = "libiconv - character set conversion (UTF-8, Latin-1, …)"
version = "system"
libs = "iconv"
headers = "iconv.h"
system.brew = "libiconv"
system.apt = "libc6-dev"

[gmp]
description = "GMP - GNU Multiple Precision arithmetic (big integers, rationals)"
version = "system"
libs = "gmp"
pkgconfig = "gmp"
headers = "gmp.h"
system.brew = "gmp"
system.apt = "libgmp-dev"
system.pacman = "gmp"

[onig]
description = "Oniguruma - advanced regex engine (Unicode, named groups)"
version = "system"
libs = "onig"
pkgconfig = "oniguruma"
headers = "oniguruma.h"
system.brew = "oniguruma"
system.apt = "libonig-dev"
system.pacman = "oniguruma"

[ssh2]
description = "libssh2 - SSH2 client (session, channel, SFTP, SCP)"
version = "system"
libs = "ssh2"
pkgconfig = "libssh2"
headers = "libssh2.h"
system.brew = "libssh2"
system.apt = "libssh2-1-dev"
system.pacman = "libssh2"

[git2]
description = "libgit2 - pure-C Git implementation (repos, commits, diffs)"
version = "system"
libs = "git2"
pkgconfig = "libgit2"
# git2.h is an umbrella of #includes only - bind the functional sub-headers.
headers = "git2/global.h, git2/repository.h, git2/commit.h, git2/branch.h, git2/status.h"
system.brew = "libgit2"
system.apt = "libgit2-dev"
system.pacman = "libgit2"

[archive]
description = "libarchive - reading/writing tar, zip, gzip, xz, …"
version = "system"
libs = "archive"
pkgconfig = "libarchive"
# Homebrew's libarchive is keg-only (not linked into /opt/homebrew/include).
include_dirs = "/opt/homebrew/opt/libarchive/include, /usr/local/opt/libarchive/include"
lib_dirs = "/opt/homebrew/opt/libarchive/lib, /usr/local/opt/libarchive/lib"
headers = "archive.h, archive_entry.h"
system.brew = "libarchive"
system.apt = "libarchive-dev"
system.pacman = "libarchive"

[magic]
description = "libmagic - file type detection (like the `file` command)"
version = "system"
libs = "magic"
headers = "magic.h"
system.brew = "libmagic"
system.apt = "libmagic-dev"
system.pacman = "file"
