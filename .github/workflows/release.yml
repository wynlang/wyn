name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wyn-linux-x64
          - os: macos-15
            artifact: wyn-macos-arm64
          - os: macos-15-intel
            artifact: wyn-macos-x64
          - os: windows-latest
            artifact: wyn-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install make mingw -y
        shell: pwsh

      - name: Build compiler
        run: make clean && make
        shell: bash

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          echo 'fn main() -> int { println("Wyn release OK"); return 0 }' > /tmp/smoke.wyn
          ./wyn build /tmp/smoke.wyn
          /tmp/smoke | grep -q "OK"
          echo "✅ Release build verified"
        shell: bash

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          echo fn main() { println("Wyn release OK") } > smoke.wyn
          wyn.exe build smoke.wyn
          smoke.exe
        shell: cmd

      # Layout contract (install.sh depends on this - see the canary job):
      #   bin/wyn            the compiler
      #   src/wyn_runtime.h  runtime sources (bin/../src probe in main.c)
      #   runtime/libwyn_rt.a
      #   vendor/minicoro/
      #   VERSION
      #   LICENSE
      # The old packaging had wyn at the tarball ROOT (install.sh expected
      # bin/), nested sources at src/src/ (cp -r src dist/src copies INTO an
      # existing dir), and no VERSION - so no released binary ever worked.
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/bin dist/runtime dist/vendor
          cp wyn dist/bin/
          cp -r src dist/
          cp VERSION dist/
          cp LICENSE dist/
          [ -d vendor/minicoro ] && cp -r vendor/minicoro dist/vendor/
          make runtime
          cp runtime/libwyn_rt.a dist/runtime/
          tar czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Verify artifact layout (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p /tmp/verify && tar xzf ${{ matrix.artifact }}.tar.gz -C /tmp/verify
          test -x /tmp/verify/bin/wyn
          test -f /tmp/verify/src/wyn_runtime.h
          test -f /tmp/verify/runtime/libwyn_rt.a
          test -f /tmp/verify/VERSION
          test -f /tmp/verify/LICENSE
          # The INSTALLED binary must compile and run hello world from a
          # foreign cwd - this exact path was broken in every prior release.
          cd /tmp && echo 'fn main() { println("install-ok") }' > hello.wyn
          /tmp/verify/bin/wyn run hello.wyn | grep -q "install-ok"
          /tmp/verify/bin/wyn version | grep -vq "1.10.0"
          echo "✅ artifact layout + installed-binary smoke verified"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist\bin
          copy wyn.exe dist\bin\
          xcopy /E /I src dist\src
          copy VERSION dist\
          copy LICENSE dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  # THE GATE: simulate the exact public `curl | sh` install flow against the
  # just-built artifacts on clean VMs. If a stranger couldn't install and run
  # hello world, the release does not happen. (Every prior release shipped
  # broken: asset-name mismatch vs install.sh, no bin/ layout, src/src/
  # nesting, missing VERSION - nothing exercised the public path.)
  install-canary:
    name: Install canary (${{ matrix.artifact }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wyn-linux-x64
          - os: macos-15
            artifact: wyn-macos-arm64
          - os: macos-15-intel
            artifact: wyn-macos-x64
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Install exactly like install.sh does
        run: |
          # Mirror site/public/install.sh: extract into ~/.wyn, run bin/wyn.
          INSTALL_DIR="$HOME/.wyn"
          mkdir -p "$INSTALL_DIR"
          tar xzf ${{ matrix.artifact }}.tar.gz -C "$INSTALL_DIR"
          chmod +x "$INSTALL_DIR/bin/wyn"
          export PATH="$INSTALL_DIR/bin:$PATH"
          # First-five-minutes flow, from a foreign cwd, like a real user.
          cd "$(mktemp -d)"
          wyn version
          wyn version | grep -vq "1.10.0"
          echo 'fn main() { println("hello from installed wyn") }' > hello.wyn
          wyn run hello.wyn | grep -q "hello from installed wyn"
          wyn new demo --template cli
          cd demo && wyn test
          echo "✅ public install flow verified on ${{ matrix.artifact }}"

  release:
    name: Create Release
    needs: [build, install-canary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            wyn-linux-x64/wyn-linux-x64.tar.gz
            wyn-macos-arm64/wyn-macos-arm64.tar.gz
            wyn-macos-x64/wyn-macos-x64.tar.gz
            wyn-windows-x64/wyn-windows-x64.zip
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
